name: scrape

# Daily scrape — defaults to 18:00 IST (12:30 UTC).
# Existing oriz-*-api repos may keep their staggered cron (e.g. 01:00 UTC) to
# avoid hammering the same upstream at the same minute; this template's value
# is just the default for new repos.
on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Scrape
        run: pnpm run scrape

      - name: Commit data/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
